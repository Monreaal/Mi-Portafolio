<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Monreal 💻</title>
        <!--CEO-->
    <title>Portafolio Monreal 💻</title> <!-- define el título del documento, que se muestra en la pestaña del navegador o en CEO de Google-->
    <meta name="description" content="Portafolio de Monreal, desarrollador web y diseñador gráfico. Aquí encontrarás una selección de mis proyectos y experiencia en el campo del desarrollo web y diseño gráfico."> <!-- proporciona una descripción del contenido de la página para los motores de búsqueda -->
    <link rel="canonical" href="https://monreal.dev"> <!-- especifica la URL canónica de la página para evitar problemas de contenido duplicado -->
    <link rel="alternate" href="https://monreal.dev/en" hreflang="es-GB"> <!-- indica la versión alternativa de la página para diferentes idiomas o regiones -->
    <!--open graph-->
    <meta property="og:title" content="Portafolio Monreal 💻">
    <meta property="og:description" content="Portafolio de desarrollador de softwarey diseñador gráfico.">
    <meta property="og:image" content="/images/imagen.jpg" alt="foto de monreal">
    <meta property="og:url" content="https://monreal.dev">

    <link rel="stylesheet" href="/styles.css"> <!-- enlaza una hoja de estilo externa para aplicar estilos al documento -->
    
    <meta name="robots" content="index, follow"> <!-- indica a los motores de búsqueda que indexen la página y sigan los enlaces -->
    <meta name="theme-color" content="#09f"> <!-- define el color del tema para navegadores móviles -->
    <link rel="icon" type="image/png" href="/images/icono.png"> <!-- define el icono que se muestra en la pestaña del navegador -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
